<!DOCTYPE html>
<html>
<head>
<title>Login Window</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-color:#f0f0f0;
    font-family:Arial, sans-serif;
}

.login-box{
    background-color:white;
    padding:30px;
    border:1px solid #ccc;
    border-radius:8px;
    text-align:center;
    width:250px;
}

.login-box h2{
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:8px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:4px;
}

.login-box button{
    width:100%;
    padding:10px;
    background-color:#4CAF50;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.login-box button:hover{
    background-color:#45a049;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
