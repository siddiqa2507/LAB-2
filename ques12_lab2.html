<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Portal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: skyblue;
            scroll-behavior: smooth;
        }

        h1 {
            text-align: center;
            color: darkblue;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .nav {
            text-align: center;
            margin-bottom: 25px;
        }

        .nav a {
            text-decoration: none;
            background-color: darkblue;
            color: white;
            padding: 10px 18px;
            margin: 8px;
            border-radius: 8px;
            display: inline-block;
            font-weight: bold;
        }

        form {
            width: 80%;
            margin: auto;
            padding-bottom: 30px;
        }

        .section {
            background-color: darkblue;
            color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
        }

        .section h2 {
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid white;
            padding-bottom: 10px;
        }

        .form-group {
            margin: 12px 0;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .submit-btn {
            display: block;
            margin: 20px auto 0;
            background-color: white;
            color: darkblue;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: lightgray;
        }
    </style>
</head>
<body>

    <h1>Student Registration Portal</h1>

    <div class="nav">
        <a href="#personal">Personal Information</a>
        <a href="#academic">Academic Details</a>
        <a href="#address">Address Information</a>
        <a href="#account">Account Credentials</a>
    </div>

    <form onsubmit="alert('Form Submitted Successfully')">
        
        <div class="section" id="personal">
            <h2>Personal Information</h2>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullname">
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select name="gender">
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email">
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="text" name="mobile">
            </div>
        </div>

        <div class="section" id="academic">
            <h2>Academic Details</h2>

            <div class="form-group">
                <label>Register Number</label>
                <input type="text" name="regno">
            </div>

            <div class="form-group">
                <label>Degree Program</label>
                <input type="text" name="degree">
            </div>

            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department">
            </div>

            <div class="form-group">
                <label>Year of Study</label>
                <input type="text" name="year">
            </div>
        </div>

        <div class="section" id="address">
            <h2>Address Information</h2>

            <div class="form-group">
                <label>Door Number</label>
                <input type="text" name="doorno">
            </div>

            <div class="form-group">
                <label>Street Name</label>
                <input type="text" name="street">
            </div>

            <div class="form-group">
                <label>City</label>
                <input type="text" name="city">
            </div>

            <div class="form-group">
                <label>State</label>
                <input type="text" name="state">
            </div>

            <div class="form-group">
                <label>Pincode</label>
                <input type="text" name="pincode">
            </div>
        </div>

        <div class="section" id="account">
            <h2>Account Credentials</h2>

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password">
            </div>

            <button type="submit" class="submit-btn">Submit</button>
        </div>

    </form>

</body>
</html>
